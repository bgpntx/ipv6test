<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Polymarket Fee Checker – ipv6.0ms.app</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0b0f" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f6f7fb" media="(prefers-color-scheme: light)">
  <meta name="description" content="Перевірка комісій Polymarket за slug або URL події.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Spinnaker&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f6f7fb;
      --bg-elevated: #ffffff;
      --border: #e5e7eb;
      --border-strong: #cbd5e1;
      --text: #0f172a;
      --text-muted: #64748b;
      --text-soft: #94a3b8;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --accent-fg: #ffffff;
      --accent-soft: #eef2ff;
      --ok-bg: #dcfce7;
      --ok-fg: #166534;
      --ok-border: #86efac;
      --fail-bg: #fee2e2;
      --fail-fg: #991b1b;
      --fail-border: #fca5a5;
      --warn-bg: #fef3c7;
      --warn-fg: #92400e;
      --warn-border: #fcd34d;
      --code-bg: #f1f5f9;
      --radius-sm: 6px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --radius-pill: 999px;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, .04), 0 1px 3px rgba(15, 23, 42, .06);
      --shadow-md: 0 4px 12px -2px rgba(15, 23, 42, .05), 0 10px 24px -6px rgba(15, 23, 42, .08);
      --font-sans: "Inter", -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      --font-display: "Spinnaker", "Inter", -apple-system, sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0b0f;
        --bg-elevated: #14161c;
        --border: #262933;
        --border-strong: #374151;
        --text: #e5e7eb;
        --text-muted: #9ca3af;
        --text-soft: #6b7280;
        --accent: #818cf8;
        --accent-hover: #a5b4fc;
        --accent-fg: #0a0b0f;
        --accent-soft: rgba(129, 140, 248, .12);
        --ok-bg: rgba(34, 197, 94, .12);
        --ok-fg: #86efac;
        --ok-border: rgba(34, 197, 94, .3);
        --fail-bg: rgba(239, 68, 68, .12);
        --fail-fg: #fca5a5;
        --fail-border: rgba(239, 68, 68, .3);
        --warn-bg: rgba(245, 158, 11, .12);
        --warn-fg: #fcd34d;
        --warn-border: rgba(245, 158, 11, .3);
        --code-bg: #1a1d26;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, .3), 0 1px 3px rgba(0, 0, 0, .4);
        --shadow-md: 0 4px 12px -2px rgba(0, 0, 0, .3), 0 10px 24px -6px rgba(0, 0, 0, .5);
      }
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, var(--accent-soft), transparent),
        radial-gradient(ellipse 60% 40% at 100% 100%, var(--accent-soft), transparent);
      background-attachment: fixed;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    main {
      max-width: 48rem;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-size: .85rem;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 1.5rem;
      font-weight: 500;
    }
    .brand .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      margin: 0 0 .5rem;
    }
    .lead {
      font-size: 1rem;
      color: var(--text-muted);
      margin: 0 0 2rem;
    }

    .card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      box-shadow: var(--shadow-sm);
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-weight: 600;
      font-size: .9rem;
      margin-bottom: .5rem;
      color: var(--text);
    }

    .input-group {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
    }
    input[type="text"] {
      flex: 1 1 20rem;
      min-width: 0;
      padding: .7rem .9rem;
      font: inherit;
      font-size: .95rem;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    input[type="text"]::placeholder { color: var(--text-soft); }
    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    button {
      padding: .7rem 1.25rem;
      font: inherit;
      font-size: .95rem;
      font-weight: 600;
      color: var(--accent-fg);
      background: var(--accent);
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background .15s ease, transform .05s ease;
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      white-space: nowrap;
    }
    button:hover { background: var(--accent-hover); }
    button:active { transform: translateY(1px); }
    button:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
    }
    button .spinner {
      width: 14px; height: 14px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .alert {
      padding: .85rem 1rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--fail-border);
      background: var(--fail-bg);
      color: var(--fail-fg);
      font-size: .9rem;
      margin-top: 1rem;
      display: flex;
      align-items: flex-start;
      gap: .5rem;
    }
    .alert .icon { flex: 0 0 auto; }

    .results { margin-top: 1.5rem; }
    .results[hidden] { display: none; }

    .event-head {
      margin-bottom: 1rem;
    }
    .event-head h2 {
      font-size: 1.15rem;
      margin: 0 0 .25rem;
      color: var(--text);
      line-height: 1.3;
    }
    .event-meta {
      font-size: .85rem;
      color: var(--text-muted);
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .event-meta code {
      background: var(--code-bg);
      padding: .1rem .4rem;
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: .85em;
    }

    .market {
      padding: 1rem 0;
      border-top: 1px solid var(--border);
    }
    .market:first-child { border-top: none; padding-top: 0; }
    .market-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: .5rem;
    }
    .market-question {
      font-weight: 500;
      color: var(--text);
      flex: 1 1 20rem;
      min-width: 0;
    }
    .market-body {
      font-size: .88rem;
      color: var(--text-muted);
      display: grid;
      gap: .25rem;
    }
    .market-body code {
      font-family: var(--font-mono);
      font-size: .85em;
      background: var(--code-bg);
      padding: .1rem .4rem;
      border-radius: var(--radius-sm);
      word-break: break-all;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      padding: .25rem .65rem;
      border-radius: var(--radius-pill);
      font-size: .78rem;
      font-weight: 600;
      border: 1px solid transparent;
      line-height: 1;
      white-space: nowrap;
    }
    .pill.ok   { background: var(--ok-bg); color: var(--ok-fg); border-color: var(--ok-border); }
    .pill.warn { background: var(--warn-bg); color: var(--warn-fg); border-color: var(--warn-border); }
    .pill.fail { background: var(--fail-bg); color: var(--fail-fg); border-color: var(--fail-border); }
    .pill.muted { background: var(--code-bg); color: var(--text-muted); border-color: var(--border); }

    .result-line {
      margin-top: .4rem;
      font-weight: 500;
    }
    .result-line.ok { color: var(--ok-fg); }
    .result-line.warn { color: var(--warn-fg); }
    .result-line.fail { color: var(--fail-fg); }

    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: .85rem;
      color: var(--text-muted);
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: space-between;
    }
    footer a {
      color: var(--text-muted);
      text-decoration: none;
      border-bottom: 1px dotted var(--text-soft);
    }
    footer a:hover { color: var(--accent); border-color: var(--accent); }

    .card, h1, .lead, .brand, footer {
      animation: fadeUp .4s ease-out backwards;
    }
    .brand { animation-delay: 0s; }
    h1 { animation-delay: .05s; }
    .lead { animation-delay: .1s; }
    .card { animation-delay: .15s; }
    footer { animation-delay: .25s; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <main>
    <a class="brand" href="/"><span class="dot"></span> 0ms.app</a>

    <h1>Polymarket Fee Checker</h1>
    <p class="lead">Введи slug або повний URL події Polymarket — інструмент покаже, чи застосовується taker fee для кожного маркету.</p>

    <section class="card">
      <label for="slugInput">Slug або URL події</label>
      <div class="input-group">
        <input id="slugInput" type="text" autocomplete="off" spellcheck="false"
               placeholder="btc-updown-5m-1773313500 або https://polymarket.com/event/..." />
        <button id="checkBtn" type="button">
          <span id="btnLabel">Перевірити fee</span>
        </button>
      </div>
      <div id="error"></div>
    </section>

    <section id="results" class="card results" hidden></section>

    <footer>
      <span>Дані через Gamma API + CLOB fee-rate.</span>
      <a href="/">← IPv6 Connectivity Test</a>
    </footer>
  </main>

  <script>
    const gammaBase = "/gamma-api";
    const clobBase = "/clob-api";

    const $ = (id) => document.getElementById(id);

    function extractSlug(input) {
      try {
        if (input.includes("://")) {
          const url = new URL(input.trim());
          const parts = url.pathname.split("/").filter(Boolean);
          const idx = parts.indexOf("event");
          if (idx !== -1 && parts[idx + 1]) return parts[idx + 1];
          return parts[parts.length - 1];
        }
      } catch (e) { /* not a URL */ }
      return input.trim();
    }

    async function fetchJson(url) {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error("HTTP " + resp.status + " for " + url);
      return resp.json();
    }

    async function getFeeRate(tokenId) {
      const url = clobBase + "/fee-rate?token_id=" + encodeURIComponent(tokenId);
      const resp = await fetch(url);
      if (!resp.ok) throw new Error("HTTP " + resp.status + " for fee-rate");
      const data = await resp.json();
      return data.base_fee ?? 0;
    }

    function showError(msg) {
      const el = $("error");
      el.innerHTML = '<div class="alert"><span class="icon">⚠</span><span>' + msg + '</span></div>';
    }
    function clearError() { $("error").innerHTML = ""; }

    function setLoading(loading) {
      const btn = $("checkBtn");
      const label = $("btnLabel");
      btn.disabled = loading;
      if (loading) {
        btn.innerHTML = '<span class="spinner"></span><span>Перевіряю…</span>';
      } else {
        btn.innerHTML = '<span id="btnLabel">Перевірити fee</span>';
      }
    }

    function el(tag, props = {}, children = []) {
      const node = document.createElement(tag);
      for (const [k, v] of Object.entries(props)) {
        if (k === "class") node.className = v;
        else if (k === "text") node.textContent = v;
        else node.setAttribute(k, v);
      }
      for (const c of children) {
        if (c != null) node.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
      }
      return node;
    }

    async function runCheck() {
      const input = $("slugInput").value.trim();
      const resultsEl = $("results");
      clearError();
      resultsEl.hidden = true;
      resultsEl.innerHTML = "";

      if (!input) {
        showError("Введи slug або URL.");
        return;
      }

      setLoading(true);
      const slug = extractSlug(input);

      try {
        const events = await fetchJson(gammaBase + "/events?slug=" + encodeURIComponent(slug));
        if (!Array.isArray(events) || events.length === 0) {
          throw new Error("Подій з таким slug не знайдено.");
        }

        const event = events[0];
        const markets = event.markets || [];
        if (!markets.length) throw new Error("У події немає маркетів.");

        resultsEl.hidden = false;

        const head = el("div", { class: "event-head" }, [
          el("h2", { text: event.title || event.question || "—" }),
          el("div", { class: "event-meta" }, [
            el("span", {}, ["slug: ", el("code", { text: slug })]),
            el("span", { text: markets.length + " market" + (markets.length === 1 ? "" : "s") }),
          ]),
        ]);
        resultsEl.appendChild(head);

        for (const m of markets) {
          const q = m.question || "—";
          const feesEnabled = !!m.feesEnabled;

          let tokenIdsRaw = m.clobTokenIds;
          let tokenIds = [];
          if (Array.isArray(tokenIdsRaw)) tokenIds = tokenIdsRaw;
          else if (typeof tokenIdsRaw === "string") {
            try { tokenIds = JSON.parse(tokenIdsRaw); } catch (e) { tokenIds = []; }
          }
          const firstTokenId = tokenIds[0];

          const feePill = el("span", {
            class: "pill " + (feesEnabled ? "warn" : "ok"),
            text: feesEnabled ? "feesEnabled: true" : "feesEnabled: false",
          });

          const head = el("div", { class: "market-head" }, [
            el("span", { class: "market-question", text: q }),
            feePill,
          ]);

          const body = el("div", { class: "market-body" });
          body.appendChild(el("div", {}, [
            "Token ID: ",
            firstTokenId ? el("code", { text: firstTokenId }) : el("span", { class: "pill muted", text: "немає" }),
          ]));

          const mDiv = el("div", { class: "market" }, [head, body]);
          resultsEl.appendChild(mDiv);

          if (firstTokenId) {
            try {
              const baseFee = await getFeeRate(firstTokenId);
              body.appendChild(el("div", {}, [
                "base_fee: ",
                el("code", { text: baseFee + " bps" }),
                " (~" + (baseFee / 100).toFixed(2) + "% параметр кривої)",
              ]));

              let resultClass, resultText;
              if (!feesEnabled || baseFee === 0) {
                resultClass = "ok";
                resultText = "✓ NO trading fee (effective taker fee ~0%)";
              } else {
                resultClass = "warn";
                resultText = "⚠ FEE APPLIES — dynamic taker fee, peak ~1–2% навколо 50% ймовірності";
              }
              body.appendChild(el("div", { class: "result-line " + resultClass, text: resultText }));
            } catch (e) {
              body.appendChild(el("div", { class: "result-line fail", text: "✗ Не зміг отримати fee-rate для token_id." }));
            }
          } else {
            body.appendChild(el("div", { class: "result-line fail", text: "✗ Немає clobTokenIds → неможливо перевірити fee-rate." }));
          }
        }
      } catch (e) {
        console.error(e);
        showError(e.message || "Помилка запиту або CORS.");
      } finally {
        setLoading(false);
      }
    }

    $("slugInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") runCheck();
    });
    $("checkBtn").addEventListener("click", runCheck);
  </script>
</body>
</html>
